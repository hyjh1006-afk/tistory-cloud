name: daily-tistory

# schedule.json의 시간표(한국시간, 30분 단위)에 맞춰 글을 자동 생성해
# state/outputs/ 대기 목록에 쌓는다. 앱에서 복사→티스토리에 올리면 됨.
# Actions 탭의 Run workflow 버튼으로 즉시 실행도 가능 (모드 선택).

on:
  schedule:
    - cron: "*/30 * * * *"   # 30분마다 깨어나 시간표 확인 (공개 저장소라 무료)
  workflow_dispatch:
    inputs:
      mode:
        description: "글 종류"
        type: choice
        options: [two_sentence, nosleep]
        default: two_sentence

permissions:
  contents: write

concurrency:
  group: daily-tistory
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: 시간표 확인
        id: gate
        env:
          EVENT: ${{ github.event_name }}
          INPUT_MODE: ${{ inputs.mode }}
        run: |
          python3 - <<'EOF'
          import json, os, datetime
          now = datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=9)
          slot = f"{now.hour:02d}:{'30' if now.minute >= 30 else '00'}"
          cfg = json.load(open("schedule.json"))
          mode = ""
          if os.environ.get("EVENT") == "workflow_dispatch":
              mode = os.environ.get("INPUT_MODE") or "two_sentence"
          elif slot in cfg.get("times", []):
              mode = "two_sentence"
          elif slot in cfg.get("nosleep_times", []):
              mode = "nosleep"
          print(f"KST slot={slot}, mode={mode or '(스킵)'}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"mode={mode}\n")
          EOF

      - name: 파이썬 준비
        if: steps.gate.outputs.mode != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        if: steps.gate.outputs.mode != ''
        run: pip install requests

      - name: 글 생성
        if: steps.gate.outputs.mode != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_generate.py "${{ steps.gate.outputs.mode }}"

      - name: 결과 저장 (커밋)
        if: steps.gate.outputs.mode != ''
        run: |
          git config user.name "tistory-cloud-bot"
          git config user.email "287627535+hyjh1006-afk@users.noreply.github.com"
          git add state
          if git diff --cached --quiet; then
            echo "저장할 변경 없음"
          else
            git commit -m "자동 생성: 대기 목록에 추가"
            git pull --rebase origin main
            git push
          fi
